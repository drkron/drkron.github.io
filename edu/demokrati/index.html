<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demokrati-utmaningen: 100 frågor</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        .subtitle { color: #64748b; margin-bottom: 2rem; font-style: italic; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.1s, background 0.2s;
            width: 100%;
            margin: 0.5rem 0;
        }

        .btn:hover { background: #1d4ed8; }
        .btn:active { transform: scale(0.98); }

        .option-btn {
            background: #f1f5f9;
            color: var(--text);
            text-align: left;
            padding: 1rem;
            border: 2px solid #e2e8f0;
        }

        .option-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }

        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        #progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.3s;
        }

        .hidden { display: none; }

        #question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin: 1rem 0;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Startskärm -->
    <div id="start-screen">
        <h1>Demokrati-utmaningen</h1>
        <p class="subtitle">Testa dina kunskaper om folkstyre, rättigheter och hur Sverige styrs!</p>
        <p>Varje omgång består av 10 slumpmässiga frågor från vår bank med 100 utmaningar.</p>
        <button class="btn" onclick="startGame()">Starta spelet</button>
    </div>

    <!-- Spelskärm -->
    <div id="quiz-screen" class="hidden">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="stats">Fråga <span id="q-current">1</span> av 10</div>
        <div id="question-text">Laddar fråga...</div>
        <div id="options-container">
            <button class="btn option-btn" onclick="handleOption(0)"></button>
            <button class="btn option-btn" onclick="handleOption(1)"></button>
            <button class="btn option-btn" onclick="handleOption(2)"></button>
            <button class="btn option-btn" onclick="handleOption(3)"></button>
        </div>
    </div>

    <!-- Resultatskärm -->
    <div id="result-screen" class="hidden">
        <h1>Bra jobbat!</h1>
        <p>Du avslutade omgången med poängen:</p>
        <div class="score-display"><span id="final-score">0</span> / 10</div>
        <div id="feedback-text"></div>
        <button class="btn" onclick="location.reload()">Spela igen</button>
    </div>
</div>

<script>
    const allQuestions = [

        { q: "Vilken är den största skillnaden mellan demokrati och diktatur gällande värde?", a: "I diktatur är alla lika värda", b: "I demokrati är vissa mer värda", c: "I demokrati är alla lika värda", d: "Det finns ingen skillnad", correct: 2 },
        { q: "Vad händer ofta i en diktatur om man tycker annorlunda än de som bestämmer?", a: "Man får medalj", b: "Man riskerar fängelse eller våld", c: "Ingenting händer", d: "Man får vara med i regeringen", correct: 1 },

        // 11-20: Demokrati vs Diktatur
        { q: "Vem bestämmer i en diktatur?", a: "Hela folket", b: "En eller några få personer", c: "Bara barnen", d: "Ingen", correct: 1 },

        { q: "Har alla samma rättigheter och skyldigheter i en diktatur?", a: "Ja, alltid", b: "Nej, oftast inte", c: "Bara på helger", d: "Det beror på vädret", correct: 1 },
        { q: "Får man i en demokrati göra precis vad man vill?", a: "Ja, utan undantag", b: "Nej, man får inte diskriminera eller skada andra", c: "Bara om man är politiker", d: "Ja, så länge man är tyst", correct: 1 },

        { q: "Vad är ett 'klassråd' ett exempel på?", a: "Representativ demokrati", b: "Diktatur", c: "Direkt demokrati", d: "Anarki", correct: 2 },

        { q: "Vad händer om ordföranden inte följer dagordningen?", a: "Mötet blir rörigt och man glömmer punkter", b: "Man får gå hem tidigare", c: "Polisen kommer", d: "Ingenting händer", correct: 0 },
        { q: "När justeras ett protokoll?", a: "Innan mötet börjar", b: "Efter att det har skrivits färdigt", c: "Under själva röstningen", d: "Vart fjärde år", correct: 1 },

        // 41-50: Kommuner
        { q: "Hur många kommuner finns det i Sverige?", a: "100", b: "290", c: "349", d: "10", correct: 1 },

        { q: "Hur kan man påverka i en demokrati förutom att rösta?", a: "Genom att skriva insändare eller demonstrera", b: "Genom att hota politiker", c: "Man kan inte påverka på andra sätt", d: "Genom att låsa in de som tycker olika", correct: 0 },

        { q: "Vad innebar det att kvinnor inte var 'myndiga' förr?", a: "Att de inte fick gå i skolan", b: "Att pappan eller maken bestämde över dem", c: "Att de inte fick arbeta", d: "Att de inte fick äta vad de ville", correct: 1 },
        { q: "Vem kämpade mot apartheid i Sydafrika?", a: "Nelson Mandela", b: "Statsministern", c: "Talmannen", d: "Kungen", correct: 0 },
        { q: "Vad var 'apartheid'?", a: "Ett demokratiskt system", b: "Ett rasistiskt system där svarta saknade rättigheter", c: "En sorts musik", d: "Ett politiskt parti", correct: 1 },
        { q: "Vilket land kallades för 'Sovjetunionen' förr?", a: "USA", b: "Ryssland (och flera andra nationer)", c: "Tyskland", d: "Sydafrika", correct: 1 },
        { q: "Vad är ett hot mot demokratin idag?", a: "Att folk röstar för mycket", b: "Ledare som ändrar lagar för att få mer makt", c: "Att barn får gå i skolan", d: "Att det finns för många bibliotek", correct: 1 },
        { q: "Vad kallas det när ett land bara har en ledare att rösta på?", a: "Direkt demokrati", b: "Låtsasdemokrati eller diktatur", c: "Perfekt demokrati", d: "Monarki", correct: 1 },
        { q: "Varför är det viktigt att kämpa för demokrati?", a: "För att skydda allas lika värde och frihet", b: "För att det är billigare", c: "För att politiker ska få högre lön", d: "Det är inte viktigt", correct: 0 }
    ];

    let currentQuestions = [];
    let qIndex = 0;
    let score = 0;

    function startGame() {
        // Slumpa 10 frågor från de 100
        currentQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
        qIndex = 0;
        score = 0;
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        showQuestion();
    }

    function showQuestion() {
        const qObj = currentQuestions[qIndex];
        document.getElementById('q-current').innerText = qIndex + 1;
        document.getElementById('question-text').innerText = qObj.q;
        
        const buttons = document.querySelectorAll('.option-btn');
        const options = [qObj.a, qObj.b, qObj.c, qObj.d];
        
        buttons.forEach((btn, i) => {
            btn.innerText = options[i];
            btn.className = 'btn option-btn'; // Reset classes
            btn.disabled = false;
        });

        const progress = ((qIndex) / 10) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';
    }

    function handleOption(idx) {
        const qObj = currentQuestions[qIndex];
        const buttons = document.querySelectorAll('.option-btn');
        
        // Disable all buttons immediately
        buttons.forEach(btn => btn.disabled = true);

        if (idx === qObj.correct) {
            buttons[idx].classList.add('correct');
            score++;
        } else {
            buttons[idx].classList.add('wrong');
            buttons[qObj.correct].classList.add('correct');
        }

        setTimeout(() => {
            qIndex++;
            if (qIndex < 10) {
                showQuestion();
            } else {
                endGame();
            }
        }, 1500);
    }

    function endGame() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        let feedback = "";
        if (score === 10) feedback = "Fantastiskt! Du är en riktig demokratiexpert!";
        else if (score >= 7) feedback = "Riktigt bra jobbat! Du har koll på läget.";
        else if (score >= 5) feedback = "Helt okej, men läs gärna texten en gång till för att få alla rätt!";
        else feedback = "Demokrati är svårt men viktigt. Ge inte upp, försök igen!";
        
        document.getElementById('feedback-text').innerText = feedback;
    }
</script>
